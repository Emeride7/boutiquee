<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Project Hub — Tableau de bord GitHub d'Éméride">
<meta name="theme-color" id="themeColor" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ProjectHub">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Project Hub · emeride7</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root {
  --ease: cubic-bezier(.22,1,.36,1);
  --ease-in: cubic-bezier(.55,0,1,.45);

  /* DARK */
  --bg:          #0a0a0f;
  --bg-2:        #111118;
  --bg-3:        #1a1a24;
  --bg-card:     #13131c;
  --border:      rgba(255,255,255,.07);
  --border-2:    rgba(255,255,255,.12);
  --text:        #e8e8f0;
  --text-2:      #9090a8;
  --text-3:      #55556a;
  --accent:      #00e5a0;
  --accent-2:    rgba(0,229,160,.12);
  --accent-3:    rgba(0,229,160,.06);
  --glow:        0 0 40px rgba(0,229,160,.15);
  --shadow:      0 4px 24px rgba(0,0,0,.5);
  --shadow-lg:   0 12px 48px rgba(0,0,0,.6);
  --mono:        'JetBrains Mono', monospace;
  --display:     'Syne', sans-serif;
}

[data-theme="light"] {
  --bg:          #f5f5f0;
  --bg-2:        #eeede8;
  --bg-3:        #e4e3de;
  --bg-card:     #ffffff;
  --border:      rgba(0,0,0,.07);
  --border-2:    rgba(0,0,0,.12);
  --text:        #18181f;
  --text-2:      #55556a;
  --text-3:      #9090a8;
  --accent:      #009966;
  --accent-2:    rgba(0,153,102,.1);
  --accent-3:    rgba(0,153,102,.05);
  --glow:        0 0 40px rgba(0,153,102,.1);
  --shadow:      0 4px 24px rgba(0,0,0,.08);
  --shadow-lg:   0 12px 48px rgba(0,0,0,.12);
}

/* ═══════════════════════════════════════════
   RESET
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--display);
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
  transition:background .35s var(--ease), color .35s var(--ease);
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
img{display:block;max-width:100%}

/* ═══════════════════════════════════════════
   BACKGROUND NOISE + GRID
═══════════════════════════════════════════ */
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,229,160,.08) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
}
[data-theme="light"] body::before{
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,153,102,.06) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.app{
  position:relative;z-index:1;
  max-width:960px;
  margin:0 auto;
  padding:0 16px 100px;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.header{
  padding:48px 0 32px;
  display:flex;
  flex-direction:column;
  gap:24px;
}

.header__top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
}

.header__id{
  display:flex;
  align-items:center;
  gap:14px;
}

.header__avatar{
  width:48px;height:48px;
  border-radius:12px;
  border:1.5px solid var(--border-2);
  overflow:hidden;
  flex-shrink:0;
  background:var(--bg-3);
}
.header__avatar img{width:100%;height:100%;object-fit:cover}

.header__name{
  font-family:var(--display);
  font-weight:800;
  font-size:1.4rem;
  letter-spacing:-.03em;
  line-height:1;
  color:var(--text);
}
.header__handle{
  font-family:var(--mono);
  font-size:.72rem;
  color:var(--accent);
  margin-top:4px;
  letter-spacing:.04em;
}

.header__actions{
  display:flex;
  align-items:center;
  gap:10px;
}

/* Theme toggle */
.theme-btn{
  width:40px;height:40px;
  border-radius:10px;
  background:var(--bg-3);
  border:1px solid var(--border);
  color:var(--text-2);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;
  transition:background .2s, color .2s, border-color .2s;
}
.theme-btn:hover{background:var(--bg-2);color:var(--text);border-color:var(--border-2)}

/* Refresh btn */
.refresh-btn{
  width:40px;height:40px;
  border-radius:10px;
  background:var(--bg-3);
  border:1px solid var(--border);
  color:var(--text-2);
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;
  transition:background .2s, color .2s, transform .4s;
}
.refresh-btn:hover{background:var(--bg-2);color:var(--accent);border-color:var(--accent)}
.refresh-btn.spinning{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Stats bar */
.stats{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}
.stat{
  display:flex;
  flex-direction:column;
  gap:2px;
}
.stat__n{
  font-family:var(--mono);
  font-size:1.1rem;
  font-weight:600;
  color:var(--accent);
  line-height:1;
}
.stat__l{
  font-size:.7rem;
  color:var(--text-3);
  font-family:var(--mono);
  letter-spacing:.06em;
  text-transform:uppercase;
}

/* ═══════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════ */
.search-wrap{
  position:relative;
  margin-bottom:28px;
}
.search-icon{
  position:absolute;
  left:14px;top:50%;
  transform:translateY(-50%);
  color:var(--text-3);
  font-size:.85rem;
  pointer-events:none;
  transition:color .2s;
}
.search-wrap:focus-within .search-icon{color:var(--accent)}

.search{
  width:100%;
  padding:12px 16px 12px 40px;
  background:var(--bg-card);
  border:1.5px solid var(--border);
  border-radius:14px;
  font-family:var(--mono);
  font-size:.85rem;
  color:var(--text);
  transition:border-color .2s, box-shadow .2s, background .35s;
  outline:none;
  -webkit-appearance:none;
}
.search::placeholder{color:var(--text-3)}
.search:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-3), var(--glow);
}

/* Filter chips */
.filters{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:24px;
}
.chip{
  padding:6px 14px;
  border-radius:100px;
  font-family:var(--mono);
  font-size:.72rem;
  font-weight:500;
  border:1.5px solid var(--border);
  background:var(--bg-card);
  color:var(--text-2);
  transition:all .2s;
  cursor:pointer;
  letter-spacing:.03em;
}
.chip:hover{border-color:var(--border-2);color:var(--text)}
.chip.active{
  background:var(--accent-2);
  border-color:var(--accent);
  color:var(--accent);
}

/* ═══════════════════════════════════════════
   GRID
═══════════════════════════════════════════ */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:16px;
}

/* ═══════════════════════════════════════════
   CARD
═══════════════════════════════════════════ */
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:12px;
  transition:
    border-color .25s var(--ease),
    transform .3s var(--ease),
    box-shadow .3s var(--ease),
    background .35s;
  cursor:default;
  position:relative;
  overflow:hidden;
  animation:fadeUp .5s var(--ease) both;
}
.card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, var(--accent-3) 0%, transparent 60%);
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.card:hover{
  border-color:rgba(0,229,160,.25);
  transform:translateY(-3px);
  box-shadow:var(--shadow-lg), var(--glow);
}
.card:hover::before{opacity:1}

[data-theme="light"] .card:hover{
  border-color:rgba(0,153,102,.3);
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:none}
}

/* Card header */
.card__header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}
.card__name{
  font-family:var(--display);
  font-weight:700;
  font-size:.95rem;
  color:var(--text);
  letter-spacing:-.01em;
  word-break:break-word;
  line-height:1.3;
}
.card__fork-badge{
  flex-shrink:0;
  padding:3px 8px;
  border-radius:6px;
  font-family:var(--mono);
  font-size:.62rem;
  background:var(--bg-3);
  color:var(--text-3);
  border:1px solid var(--border);
  margin-top:2px;
}

/* Description */
.card__desc{
  font-size:.82rem;
  color:var(--text-2);
  line-height:1.55;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  flex:1;
}
.card__desc--empty{color:var(--text-3);font-style:italic}

/* Meta */
.card__meta{
  display:flex;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
}
.card__lang{
  display:flex;
  align-items:center;
  gap:6px;
  font-family:var(--mono);
  font-size:.72rem;
  color:var(--text-2);
}
.lang-dot{
  width:9px;height:9px;
  border-radius:50%;
  flex-shrink:0;
}
.card__stars{
  display:flex;
  align-items:center;
  gap:4px;
  font-family:var(--mono);
  font-size:.72rem;
  color:var(--text-3);
}
.card__updated{
  font-family:var(--mono);
  font-size:.68rem;
  color:var(--text-3);
  margin-left:auto;
}

/* Footer */
.card__footer{
  padding-top:12px;
  border-top:1px solid var(--border);
  display:flex;
  gap:8px;
}

.btn-open{
  flex:1;
  padding:10px 16px;
  border-radius:10px;
  background:var(--accent);
  color:#0a0a0f;
  font-family:var(--mono);
  font-size:.75rem;
  font-weight:600;
  letter-spacing:.04em;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:filter .2s, transform .15s var(--ease), box-shadow .2s;
}
.btn-open:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,229,160,.3)}
.btn-open:active{transform:translateY(0)}

[data-theme="light"] .btn-open{color:#fff}
[data-theme="light"] .btn-open:hover{box-shadow:0 6px 20px rgba(0,153,102,.3)}

.btn-gh{
  width:38px;height:38px;
  border-radius:10px;
  background:var(--bg-3);
  border:1px solid var(--border);
  color:var(--text-2);
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;
  transition:background .2s, color .2s, border-color .2s;
  flex-shrink:0;
}
.btn-gh:hover{background:var(--bg-2);color:var(--text);border-color:var(--border-2)}

/* ═══════════════════════════════════════════
   SKELETON
═══════════════════════════════════════════ */
.skeleton{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.skel{
  border-radius:8px;
  background:linear-gradient(90deg, var(--bg-3) 25%, var(--bg-2) 50%, var(--bg-3) 75%);
  background-size:200% 100%;
  animation:shimmer 1.6s infinite;
}
@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
.skel--title{height:18px;width:60%}
.skel--desc1{height:12px;width:100%}
.skel--desc2{height:12px;width:75%}
.skel--meta{height:10px;width:40%}
.skel--btn{height:38px;border-radius:10px}

/* ═══════════════════════════════════════════
   ÉTAT VIDE / ERREUR
═══════════════════════════════════════════ */
.empty-state{
  grid-column:1/-1;
  text-align:center;
  padding:64px 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}
.empty-state__icon{
  font-size:3rem;
  margin-bottom:8px;
  opacity:.4;
}
.empty-state__title{
  font-family:var(--display);
  font-weight:700;
  font-size:1.1rem;
  color:var(--text-2);
}
.empty-state__sub{
  font-size:.85rem;
  color:var(--text-3);
  max-width:320px;
  line-height:1.6;
}
.retry-btn{
  margin-top:8px;
  padding:10px 24px;
  border-radius:10px;
  background:var(--accent-2);
  border:1.5px solid var(--accent);
  color:var(--accent);
  font-family:var(--mono);
  font-size:.8rem;
  font-weight:600;
  transition:background .2s;
}
.retry-btn:hover{background:var(--accent);color:#0a0a0f}

/* ═══════════════════════════════════════════
   COUNT BAR
═══════════════════════════════════════════ */
.count-bar{
  font-family:var(--mono);
  font-size:.72rem;
  color:var(--text-3);
  margin-bottom:16px;
  letter-spacing:.04em;
}
.count-bar span{color:var(--accent)}

/* ═══════════════════════════════════════════
   BOTTOM NAV (mobile feel)
═══════════════════════════════════════════ */
.bottom-nav{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:50;
  background:var(--bg-2);
  border-top:1px solid var(--border);
  padding:10px 24px calc(10px + env(safe-area-inset-bottom));
  display:flex;
  align-items:center;
  justify-content:space-between;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  transition:background .35s;
}
.bottom-nav__brand{
  font-family:var(--mono);
  font-size:.7rem;
  color:var(--text-3);
  letter-spacing:.08em;
}
.bottom-nav__brand strong{color:var(--accent);font-weight:600}
.install-btn{
  padding:8px 18px;
  border-radius:8px;
  background:var(--accent-2);
  border:1px solid var(--accent);
  color:var(--accent);
  font-family:var(--mono);
  font-size:.72rem;
  font-weight:600;
  letter-spacing:.04em;
  display:flex;align-items:center;gap:6px;
  transition:background .2s, transform .15s;
}
.install-btn:hover{background:var(--accent);color:#0a0a0f;transform:translateY(-1px)}
.install-btn.hidden{display:none}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
.toast{
  position:fixed;
  top:20px;right:20px;z-index:200;
  background:var(--bg-card);
  border:1px solid var(--border-2);
  border-left:3px solid var(--accent);
  border-radius:12px;
  padding:12px 16px;
  font-family:var(--mono);
  font-size:.78rem;
  color:var(--text);
  box-shadow:var(--shadow-lg);
  transform:translateX(120%);
  transition:transform .3s var(--ease);
  max-width:280px;
}
.toast.show{transform:none}

/* ═══════════════════════════════════════════
   LANG COLORS
═══════════════════════════════════════════ */
.lang-HTML     { background:#e44b23 }
.lang-CSS      { background:#563d7c }
.lang-JavaScript { background:#f1e05a }
.lang-TypeScript { background:#2b7489 }
.lang-Python   { background:#3572a5 }
.lang-Java     { background:#b07219 }
.lang-PHP      { background:#4f5d95 }
.lang-Shell    { background:#89e051 }
.lang-Go       { background:#00add8 }
.lang-Rust     { background:#dea584 }
.lang-default  { background:#8b949e }

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media(max-width:480px){
  .header{padding:32px 0 20px}
  .grid{grid-template-columns:1fr}
  .header__name{font-size:1.2rem}
}
@media(min-width:768px){
  .app{padding:0 24px 80px}
  .bottom-nav{padding:12px 32px calc(12px + env(safe-area-inset-bottom))}
}
</style>
</head>

<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header__top">
      <div class="header__id">
        <div class="header__avatar">
          <img id="avatarImg" src="" alt="emeride7" loading="lazy">
        </div>
        <div>
          <div class="header__name">Project Hub</div>
          <div class="header__handle">$ emeride7 · github</div>
        </div>
      </div>
      <div class="header__actions">
        <button class="refresh-btn" id="refreshBtn" title="Actualiser" aria-label="Actualiser les projets">
          ↻
        </button>
        <button class="theme-btn" id="themeBtn" title="Changer le thème" aria-label="Basculer mode clair/sombre">
          🌙
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats" id="statsBar" style="display:none">
      <div class="stat">
        <span class="stat__n" id="statRepos">—</span>
        <span class="stat__l">repos</span>
      </div>
      <div class="stat">
        <span class="stat__n" id="statStars">—</span>
        <span class="stat__l">stars</span>
      </div>
      <div class="stat">
        <span class="stat__n" id="statLangs">—</span>
        <span class="stat__l">langages</span>
      </div>
    </div>
  </header>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input
      type="search"
      class="search"
      id="searchInput"
      placeholder="Rechercher un projet..."
      autocomplete="off"
      spellcheck="false"
      aria-label="Rechercher parmi les projets"
    >
  </div>

  <!-- FILTERS -->
  <div class="filters" id="filtersWrap" role="group" aria-label="Filtrer par langage"></div>

  <!-- COUNT -->
  <div class="count-bar" id="countBar"></div>

  <!-- GRID -->
  <main class="grid" id="grid" aria-live="polite" aria-label="Liste des projets"></main>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="bottom-nav__brand">
    <strong>ProjectHub</strong> · PWA
  </div>
  <button class="install-btn hidden" id="installBtn" aria-label="Installer l'application">
    ⬇ Installer
  </button>
</nav>

<!-- TOAST -->
<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

  });

<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const CONFIG = {
  username:   'emeride7',
  apiBase:    'https://api.github.com',
  perPage:    100,
  cacheKey:   'ph_repos_v2',
  cacheTTL:   5 * 60 * 1000, // 5 min
};

/* ═══════════════════════════════════════════
   LANG COLORS
═══════════════════════════════════════════ */
const LANG_COLORS = {
  'HTML':       '#e44b23',
  'CSS':        '#563d7c',
  'JavaScript': '#f1e05a',
  'TypeScript': '#2b7489',
  'Python':     '#3572a5',
  'Java':       '#b07219',
  'PHP':        '#4f5d95',
  'Shell':      '#89e051',
  'Go':         '#00add8',
  'Rust':       '#dea584',
};
function langColor(lang){ return LANG_COLORS[lang] || '#8b949e'; }

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let allRepos   = [];
let activeFilter = 'tous';
let searchQuery  = '';
let deferredInstall = null;

/* ═══════════════════════════════════════════
   DOM
═══════════════════════════════════════════ */
const grid        = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');
const filtersWrap = document.getElementById('filtersWrap');
const countBar    = document.getElementById('countBar');
const statsBar    = document.getElementById('statsBar');
const refreshBtn  = document.getElementById('refreshBtn');
const themeBtn    = document.getElementById('themeBtn');
const installBtn  = document.getElementById('installBtn');
const avatarImg   = document.getElementById('avatarImg');
const toast       = document.getElementById('toast');
const themeColorMeta = document.getElementById('themeColor');

/* ═══════════════════════════════════════════
   THEME
═══════════════════════════════════════════ */
const savedTheme = localStorage.getItem('ph_theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
updateThemeUI(savedTheme);

function updateThemeUI(theme){
  themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
  themeColorMeta.content = theme === 'dark' ? '#0a0a0f' : '#f5f5f0';
}

themeBtn.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next    = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ph_theme', next);
  updateThemeUI(next);
});

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let toastTimer;
function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

/* ═══════════════════════════════════════════
   SKELETON
═══════════════════════════════════════════ */
function renderSkeletons(n = 6){
  grid.innerHTML = Array(n).fill(0).map(() => `
    <div class="skeleton" aria-hidden="true">
      <div class="skel skel--title"></div>
      <div class="skel skel--desc1"></div>
      <div class="skel skel--desc2"></div>
      <div class="skel skel--meta"></div>
      <div class="skel skel--btn"></div>
    </div>
  `).join('');
}

/* ═══════════════════════════════════════════
   FETCH
═══════════════════════════════════════════ */
async function fetchRepos(force = false){
  // Cache check
  if(!force){
    try{
      const cached = JSON.parse(localStorage.getItem(CONFIG.cacheKey));
      if(cached && Date.now() - cached.ts < CONFIG.cacheTTL){
        return cached.data;
      }
    }catch(e){}
  }

  const url = `${CONFIG.apiBase}/users/${CONFIG.username}/repos?per_page=${CONFIG.perPage}&sort=updated`;
  const res = await fetch(url, {
    headers: { 'Accept': 'application/vnd.github.v3+json' }
  });

  if(!res.ok){
    if(res.status === 403){
      throw new Error('Limite API GitHub atteinte. Réessayez dans quelques minutes.');
    }
    throw new Error(`Erreur GitHub API (${res.status})`);
  }

  const data = await res.json();

  // Cache
  localStorage.setItem(CONFIG.cacheKey, JSON.stringify({ ts: Date.now(), data }));

  return data;
}

async function fetchUser(){
  try{
    const res = await fetch(`${CONFIG.apiBase}/users/${CONFIG.username}`);
    if(!res.ok) return null;
    return res.json();
  }catch{ return null; }
}

/* ═══════════════════════════════════════════
   RELATIVE TIME
═══════════════════════════════════════════ */
function relativeTime(dateStr){
  const diff = Date.now() - new Date(dateStr);
  const d = Math.floor(diff/86400000);
  if(d === 0) return "aujourd'hui";
  if(d === 1) return "hier";
  if(d < 7)   return `il y a ${d}j`;
  if(d < 30)  return `il y a ${Math.floor(d/7)}sem`;
  if(d < 365) return `il y a ${Math.floor(d/30)}mois`;
  return `il y a ${Math.floor(d/365)}an${Math.floor(d/365)>1?'s':''}`;
}

/* ═══════════════════════════════════════════
   CARD RENDER
═══════════════════════════════════════════ */
function renderCard(repo, index){
  const lang  = repo.language || null;
  const color = lang ? langColor(lang) : '#8b949e';
  const desc  = repo.description || '';
  const stars = repo.stargazers_count || 0;
  const liveUrl = repo.homepage ? repo.homepage : null;
  const ghUrl   = repo.html_url;
  const updated = relativeTime(repo.updated_at);
  const isFork  = repo.fork;

  return `
    <article
      class="card"
      style="animation-delay:${index * 0.04}s"
      data-name="${(repo.name||'').toLowerCase()}"
      data-lang="${lang||''}"
      data-desc="${desc.toLowerCase()}"
    >
      <div class="card__header">
        <div class="card__name">${escHtml(repo.name)}</div>
        ${isFork ? '<span class="card__fork-badge">fork</span>' : ''}
      </div>

      <p class="card__desc ${desc ? '' : 'card__desc--empty'}">
        ${desc ? escHtml(desc) : 'Aucune description'}
      </p>

      <div class="card__meta">
        ${lang ? `
          <span class="card__lang">
            <span class="lang-dot" style="background:${color}"></span>
            ${escHtml(lang)}
          </span>
        ` : ''}
        ${stars > 0 ? `
          <span class="card__stars">★ ${stars}</span>
        ` : ''}
        <span class="card__updated">${updated}</span>
      </div>

      <div class="card__footer">
        <a
          href="${liveUrl || ghUrl}"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-open"
          aria-label="Ouvrir ${escHtml(repo.name)}"
        >
          ${liveUrl ? '🌐 Voir le projet' : '📂 Voir le code'}
        </a>
        ${liveUrl ? `
          <a
            href="${ghUrl}"
            target="_blank"
            rel="noopener noreferrer"
            class="btn-gh"
            title="Code source GitHub"
            aria-label="Code source de ${escHtml(repo.name)}"
          >
            &lt;/&gt;
          </a>
        ` : ''}
      </div>
    </article>
  `;
}

function escHtml(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════
   FILTER + SEARCH
═══════════════════════════════════════════ */
function applyFilters(){
  const q    = searchQuery.trim().toLowerCase();
  const lang = activeFilter;

  const filtered = allRepos.filter(r => {
    const matchLang = lang === 'tous' || (r.language || '') === lang;
    const matchQ    = !q ||
      r.name.toLowerCase().includes(q) ||
      (r.description||'').toLowerCase().includes(q) ||
      (r.language||'').toLowerCase().includes(q);
    return matchLang && matchQ;
  });

  if(filtered.length === 0){
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state__icon">🔭</div>
        <div class="empty-state__title">Aucun projet trouvé</div>
        <p class="empty-state__sub">Essayez un autre mot-clé ou réinitialisez les filtres.</p>
        <button class="retry-btn" onclick="resetFilters()">Tout afficher</button>
      </div>`;
  } else {
    grid.innerHTML = filtered.map((r,i) => renderCard(r,i)).join('');
  }

  const total = allRepos.length;
  const shown = filtered.length;
  countBar.innerHTML = shown === total
    ? `<span>${total}</span> projets`
    : `<span>${shown}</span> sur ${total} projets`;
}

function resetFilters(){
  searchQuery  = '';
  activeFilter = 'tous';
  searchInput.value = '';
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.lang === 'tous');
  });
  applyFilters();
}

/* ═══════════════════════════════════════════
   FILTERS BUILD
═══════════════════════════════════════════ */
function buildFilters(repos){
  const langs = [...new Set(repos.map(r => r.language).filter(Boolean))].sort();

  filtersWrap.innerHTML = ['tous', ...langs].map(l => `
    <button
      class="chip ${l === 'tous' ? 'active' : ''}"
      data-lang="${l}"
      aria-pressed="${l === 'tous'}"
    >${l === 'tous' ? 'Tous' : l}</button>
  `).join('');

  filtersWrap.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.lang;
      filtersWrap.querySelectorAll('.chip').forEach(c => {
        c.classList.toggle('active', c === btn);
        c.setAttribute('aria-pressed', c === btn);
      });
      applyFilters();
    });
  });
}

/* ═══════════════════════════════════════════
   STATS
═══════════════════════════════════════════ */
function updateStats(repos, user){
  const totalStars = repos.reduce((s,r) => s + r.stargazers_count, 0);
  const langs = new Set(repos.map(r => r.language).filter(Boolean));

  document.getElementById('statRepos').textContent = repos.length;
  document.getElementById('statStars').textContent = totalStars;
  document.getElementById('statLangs').textContent = langs.size;

  statsBar.style.display = 'flex';

  if(user && user.avatar_url){
    avatarImg.src = user.avatar_url;
  }
}

/* ═══════════════════════════════════════════
   ERROR STATE
═══════════════════════════════════════════ */
function renderError(msg){
  grid.innerHTML = `
    <div class="empty-state">
      <div class="empty-state__icon">⚠️</div>
      <div class="empty-state__title">Impossible de charger</div>
      <p class="empty-state__sub">${escHtml(msg)}</p>
      <button class="retry-btn" onclick="load(true)">Réessayer</button>
    </div>`;
  countBar.innerHTML = '';
}

/* ═══════════════════════════════════════════
   MAIN LOAD
═══════════════════════════════════════════ */
async function load(force = false){
  renderSkeletons(6);
  refreshBtn.classList.add('spinning');
  countBar.innerHTML = '';

  try{
    const [repos, user] = await Promise.all([
      fetchRepos(force),
      fetchUser()
    ]);

    allRepos = repos.filter(r => !r.archived);
    buildFilters(allRepos);
    updateStats(allRepos, user);
    applyFilters();

    if(force) showToast('✓ Projets mis à jour');
  }catch(err){
    renderError(err.message);
    showToast('⚠ ' + err.message);
  }finally{
    refreshBtn.classList.remove('spinning');
  }
}

/* ═══════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════ */
searchInput.addEventListener('input', e => {
  searchQuery = e.target.value;
  applyFilters();
});

searchInput.addEventListener('keydown', e => {
  if(e.key === 'Escape'){ searchQuery = ''; e.target.value = ''; applyFilters(); }
});

refreshBtn.addEventListener('click', () => load(true));

/* ═══════════════════════════════════════════
   PWA INSTALL
═══════════════════════════════════════════ */
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  installBtn.classList.remove('hidden');
});

installBtn.addEventListener('click', async () => {
  if(!deferredInstall) return;
  deferredInstall.prompt();
  const { outcome } = await deferredInstall.userChoice;
  if(outcome === 'accepted'){
    installBtn.classList.add('hidden');
    showToast('✓ Application installée !');
  }
  deferredInstall = null;
});

window.addEventListener('appinstalled', () => {
  installBtn.classList.add('hidden');
  showToast('✓ Project Hub installé sur votre écran d\'accueil');
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
load();
</script>
</body>
</html>
